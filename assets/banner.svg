<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="760" height="240" fill="#0d1117"/>
  <text x="30" y="45" fill="#e6edf3" font-size="22" font-weight="700">LoRA fine-tuning</text>
  <text x="30" y="70" fill="#8b949e" font-size="13">Freeze the big model, train two tiny low-rank matrices.</text>

  <!-- Frozen base -->
  <rect x="40" y="100" width="150" height="100" rx="10" fill="#21262d" stroke="#484f58" stroke-width="2"/>
  <text x="115" y="145" fill="#8b949e" font-size="14" text-anchor="middle">Base model W</text>
  <text x="115" y="168" fill="#6e7681" font-size="12" text-anchor="middle">frozen 🔒</text>

  <!-- plus -->
  <text x="220" y="160" fill="#e6edf3" font-size="28" text-anchor="middle">+</text>

  <!-- LoRA A -->
  <rect x="260" y="115" width="70" height="70" rx="8" fill="#1f6feb" opacity="0.85"/>
  <text x="295" y="155" fill="#fff" font-size="16" text-anchor="middle" font-weight="700">A</text>
  <!-- LoRA B -->
  <rect x="345" y="115" width="70" height="70" rx="8" fill="#f78166" opacity="0.9"/>
  <text x="380" y="155" fill="#fff" font-size="16" text-anchor="middle" font-weight="700">B</text>
  <text x="337" y="205" fill="#8b949e" font-size="12" text-anchor="middle">trainable (~0.1%)</text>

  <!-- arrow -->
  <line x1="440" y1="150" x2="510" y2="150" stroke="#484f58" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Adapted -->
  <rect x="525" y="100" width="200" height="100" rx="10" fill="#238636" opacity="0.25" stroke="#238636" stroke-width="2"/>
  <text x="625" y="140" fill="#e6edf3" font-size="14" text-anchor="middle">Adapted model</text>
  <text x="625" y="163" fill="#7ee787" font-size="12" text-anchor="middle">new persona 🐱</text>
</svg>
